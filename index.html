<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-Note | Creative Strategy & Counseling</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            overflow: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Subtle Video Background */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.12;
            z-index: 0;
        }

        .content-layer {
            z-index: 10;
            padding: 20px;
        }

        /* Square Container matching your frame */
        .portrait-container {
            position: relative;
            width: 320px; /* Adjust based on your image size */
            height: auto;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            border: 1px solid rgba(212, 175, 55, 0.3); /* Subtle outer border */
            padding: 5px;
        }

        .portrait-container img {
            width: 100%;
            display: block;
            filter: grayscale(10%);
            transition: filter 0.4s ease;
        }

        /* Interaction Effect */
        .portrait-container:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .portrait-container:hover img {
            filter: grayscale(0%);
        }

        /* Typography */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            color: var(--gold);
            letter-spacing: 15px;
            margin: 0;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.9rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin: 15px 0 40px 0;
        }

        .btn-assessment {
            display: inline-block;
            padding: 18px 50px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-assessment:hover {
            background-color: var(--gold);
            color: #000;
        }

        /* Hint for the user */
        .audio-hint {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <section class="hero">
        <video autoplay muted loop class="video-bg">
            <source src="assets/the big message.mp4" type="video/mp4">
        </video>

        <div class="content-layer">
            <div class="audio-hint">Hover to activate resonance</div>
            
            <div class="portrait-container" id="portrait" onmouseenter="playAudio()" onmouseleave="pauseAudio()">
                <img src="assets/randy hensley.jpg" alt="Randy Hensley">
            </div>

            <h1>H-NOTE</h1>
            <div class="tagline">Strategy &bull; Counseling &bull; Architecture</div>

            <a href="request.html" class="btn-assessment">Request Assessment</a>
        </div>

        <audio id="hnoteAudio">
            <source src="assets/Dottie Randy.mp3" type="audio/mpeg">
        </audio>
    </section>

    <script>
        const audio = document.getElementById('hnoteAudio');
        
        function playAudio() {
            audio.play().catch(e => console.log("Audio needs user interaction first"));
        }

        function pauseAudio() {
            audio.pause();
            // Optional: reset to start when they move mouse away
            // audio.currentTime = 0; 
        }
    </script>

    <script type="text/javascript">
      (function(d, t) {
          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
          v.onload = function() {
            window.voiceflow.chat.load({
              verify: { projectID: '69e38ab264564e18b2f3a308' },
              url: 'https://general-runtime.voiceflow.com',
              versionID: 'production'
            });
          }
          v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
      })(document, 'script');
    </script>

</body>
</html>
