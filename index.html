<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-Note | Creative Strategy & Counseling</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            overflow: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Subtle Atmosphere Background */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.1;
            z-index: 0;
        }

        .content-layer {
            z-index: 10;
            padding: 20px;
        }

        /* Square Portrait Layout - Preserving your existing frame */
        .portrait-container {
            position: relative;
            width: 300px; 
            max-width: 80vw;
            margin: 0 auto 25px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .portrait-container img {
            width: 100%;
            display: block;
            border: 1px solid rgba(212, 175, 55, 0.2); /* Soft highlight around your frame */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .portrait-container:hover {
            transform: scale(1.03);
        }

        .audio-hint {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 15px;
            text-transform: uppercase;
            opacity: 0.5;
            transition: 0.3s;
        }

        .portrait-container:hover + .audio-hint {
            opacity: 1;
        }

        /* Typography */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--gold);
            letter-spacing: 12px;
            margin: 10px 0 0 0;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.85rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin: 15px 0 45px 0;
        }

        .btn-assessment {
            display: inline-block;
            padding: 16px 45px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-assessment:hover {
            background-color: var(--gold);
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        audio { display: none; }
    </style>
</head>
<body>

    <section class="hero">
        <video autoplay muted loop class="video-bg">
            <source src="assets/the big message.mp4" type="video/mp4">
        </video>

        <div class="content-layer">
            <div class="portrait-container" id="portrait" onmouseenter="playVoice()" onmouseleave="stopVoice()">
                <img src="assets/randy hensley.jpg" alt="Randy Hensley">
            </div>
            <div class="audio-hint">Engage for Resonance</div>

            <h1>H-NOTE</h1>
            <div class="tagline">Strategy &bull; Counseling &bull; Architecture</div>

            <a href="request.html" class="btn-assessment">Request Assessment</a>
        </div>

        <audio id="randyVoice">
            <source src="assets/rando H_note.mp3" type="audio/mpeg">
        </audio>
    </section>

    <script>
        const randyAudio = document.getElementById('randyVoice');
        
        function playVoice() {
            randyAudio.currentTime = 0; // Starts from beginning each time they hover
            randyAudio.play().catch(e => console.log("Interaction required"));
        }

        function stopVoice() {
            randyAudio.pause();
        }
    </script>

    <script type="text/javascript">
      (function(d, t) {
          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
          v.onload = function() {
            window.voiceflow.chat.load({
              verify: { projectID: '69e38ab264564e18b2f3a308' },
              url: 'https://general-runtime.voiceflow.com',
              versionID: 'production'
            });
          }
          v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
      })(document, 'script');
    </script>

</body>
</html>
