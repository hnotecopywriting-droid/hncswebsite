<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clubhouse Entry | H-NOTE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #D4AF37; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #D4AF37; padding: 40px; text-align: center; width: 300px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        h2 { font-family: 'Cinzel', serif; letter-spacing: 4px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: transparent; border: 1px solid rgba(212,175,55,0.3); color: white; box-sizing: border-box; }
        .btn-entry { width: 100%; padding: 12px; background: #D4AF37; color: black; border: none; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 20px; }
        .back-link { display: block; margin-top: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.4); text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>CLUBHOUSE</h2>
        <form onsubmit="event.preventDefault(); window.location.href='group-profile.html';">
            <input type="text" placeholder="USERNAME" required>
            <input type="password" placeholder="PASSWORD" required>
            <button type="submit" class="btn-entry">ENTER FREQUENCY</button>
        </form>
        <a href="index.html" class="back-link">Return to Altar</a>
    </div>
</body>
</html>
